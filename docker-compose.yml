version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jwt_auth_db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-jwt_auth_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jwt_auth_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-jwt_auth_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: jwt_auth_api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-jwt_auth_db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-98487771e364cb116035eb5287e07ebfd82b535d88665ebd10ed28d75faef890}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-mock-google-client-id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-mock-google-client-secret}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jwt_auth_network

networks:
  jwt_auth_network:
    driver: bridge

volumes:
  postgres_data:
